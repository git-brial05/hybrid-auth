<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>MHNB Sample API</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
    }

    .wrapper {
      display: flex;
      gap: 40px;
      margin: 40px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      width: 500px;
      box-sizing: border-box;
    }

    #status, #status2 {
      margin-bottom: 15px;
      font-weight: bold;
    }

    #identity {
      margin-top: 10px;
      padding: 10px;
      background: #f1f3f5;
      border-radius: 8px;
      font-family: monospace;
      line-height: 1.6;
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #claims,
    #apiResult {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      margin-top: 15px;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
      max-height: 500px;
      overflow: auto;
    }

    button {
      background: linear-gradient(135deg, #007BFF, #0056b3);
      color: white;
      border: none;
      padding: 14px;
      font-size: 15px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 10px;
    }

    button:hover {
      opacity: 0.95;
    }

    .secondary {
      background: #6c757d;
    }

    .wallet-section {
      display: none;
      margin-top: 10px;
      margin-left: 20px;
      width: calc(100% - 20px);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .small-note {
      margin-top: 8px;
      color: #666;
      font-size: 12px;
      line-height: 1.4;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <!-- LEFT: LOGIN -->
  <div class="container">
    <h2>Hybrid Authentication Demo</h2>

    <div id="status">Not logged in</div>

    <button onclick="loginA()">
      Login Flow — Traditional Username &amp; Password
    </button>

    <button onclick="showWalletInput()">
      Login Flow — GNB Digital Wallet
    </button>

    <div id="walletSection" class="wallet-section">
      <input id="xidInput" placeholder="Simulation of AMANDA Supplying FolderRSN" />
      <button onclick="loginB()">Continue</button>
    </div>

    <button class="secondary" onclick="logout()">
      Logout
    </button>

    <div id="identity"></div>
    <div id="claims"></div>
  </div>

  <!-- RIGHT: API -->
  <div class="container">
    <h2>MHNB Sample API</h2>

    <div id="status2">Ready</div>

    <button onclick="callApi()">
      Invoke PingOne DaVinci API
    </button>

    <div class="small-note">
      This test uses Flow B login for the parent session, then calls your Cloudflare Worker
      to get a DaVinci SDK token, then starts the DaVinci policy.
    </div>

    <div id="apiResult"></div>
  </div>

</div>

<script type="module">
import { UserManager } from 'https://cdn.skypack.dev/oidc-client-ts';

/* ------------------------------------------------------------------
   FLOW A
------------------------------------------------------------------ */
const configA = {
  authority: "https://auth.pingone.ca/e08e4c88-fe72-4a8d-a577-1b9cd10bd50d/as",
  client_id: "06d445f0-8a93-4ad1-9b75-804f48de9461",
  redirect_uri: "https://git-brial05.github.io/hybrid-auth/callback.html",
  post_logout_redirect_uri: "https://git-brial05.github.io/hybrid-auth/",
  response_type: "code",
  scope: "openid profile email"
};

/* ------------------------------------------------------------------
   FLOW B
------------------------------------------------------------------ */
const configB = {
  authority: "https://auth.pingone.ca/020cfdde-1f7e-4b20-b280-6da5d08301d4/as",
  client_id: "81d5e2dc-45d7-4ee7-9d04-756a6516753a",
  redirect_uri: "https://git-brial05.github.io/hybrid-auth/callbackB.html",
  post_logout_redirect_uri: "https://git-brial05.github.io/hybrid-auth/",
  response_type: "code",
  scope: "openid profile email https://auth.pingone.ca/020cfdde-1f7e-4b20-b280-6da5d08301d4/davinci"
};

const userManagerA = new UserManager(configA);
const userManagerB = new UserManager(configB);

/* ------------------------------------------------------------------
   HELPERS
------------------------------------------------------------------ */
function showJson(elementId, data) {
  const el = document.getElementById(elementId);
  el.style.display = "block";
  el.innerText = typeof data === "string" ? data : JSON.stringify(data, null, 2);
}

function setStatus(message) {
  document.getElementById("status").innerText = message;
}

function setApiStatus(message) {
  document.getElementById("status2").innerText = message;
}

/* ------------------------------------------------------------------
   UI
------------------------------------------------------------------ */
window.showWalletInput = () => {
  document.getElementById("walletSection").style.display = "block";
};

/* ------------------------------------------------------------------
   LOGIN A
------------------------------------------------------------------ */
window.loginA = async () => {
  await userManagerA.signinRedirect({
    state: { flow: "A" }
  });
};

/* ------------------------------------------------------------------
   LOGIN B
------------------------------------------------------------------ */
window.loginB = async () => {
  const xid = document.getElementById("xidInput").value.trim();

  if (!xid) {
    alert("Enter Amanda User");
    return;
  }

  await userManagerB.signinRedirect({
    state: { flow: "B" },
    extraQueryParams: {
      FolderRSN: xid,
      acr_values: "8a274eb2350a1cb6d5b97359a81f8f8e"
    }
  });
};

/* ------------------------------------------------------------------
   LOGOUT
------------------------------------------------------------------ */
window.logout = async () => {
  const userA = await userManagerA.getUser().catch(() => null);
  const userB = await userManagerB.getUser().catch(() => null);

  await userManagerA.removeUser().catch(() => {});
  await userManagerB.removeUser().catch(() => {});

  document.getElementById("identity").style.display = "none";
  document.getElementById("claims").style.display = "none";
  document.getElementById("apiResult").style.display = "none";

  if (userB) {
    await userManagerB.signoutRedirect();
    return;
  }

  if (userA) {
    await userManagerA.signoutRedirect();
    return;
  }

  setStatus("Not logged in");
  setApiStatus("Ready");
};

/* ------------------------------------------------------------------
   API CALL
------------------------------------------------------------------ */
window.callApi = async () => {
  setApiStatus("Starting...");
  showJson("apiResult", { stage: "init", message: "Preparing API invocation..." });

  // Require Flow B login because that is the parent simulation
  const user = await userManagerB.getUser().catch(() => null);

  if (!user) {
    alert("User not authenticated — login to Flow B first");
    setApiStatus("Flow B login required");
    return;
  }

  try {
    // Step 1: get DaVinci SDK token from your Cloudflare Worker
    setApiStatus("Requesting DaVinci SDK token...");

    const sdkRes = await fetch(
      "https://square-night-85ed.brial05.workers.dev/api/davinci-sdk-token",
      {
        method: "GET",
        headers: {
          "Accept": "application/json"
        }
      }
    );

    const sdkText = await sdkRes.text();
    let sdkData;

    try {
      sdkData = JSON.parse(sdkText);
    } catch {
      sdkData = { raw: sdkText };
    }

    if (!sdkRes.ok) {
      setApiStatus("SDK token request failed");
      showJson("apiResult", {
        stage: "sdk-token",
        ok: false,
        status: sdkRes.status,
        body: sdkData
      });
      return;
    }

    const sdkToken = sdkData.access_token;

    if (!sdkToken) {
      setApiStatus("SDK token missing");
      showJson("apiResult", {
        stage: "sdk-token",
        ok: false,
        error: "Worker response did not include access_token",
        body: sdkData
      });
      return;
    }

    // Step 2: start the DaVinci flow/policy
    setApiStatus("Calling DaVinci /start...");

    const pingUrl =
      "https://auth.pingone.ca/020cfdde-1f7e-4b20-b280-6da5d08301d4/policy/9faa1a92e9661219bfdbc34ff05de4e6/start";

    const startRes = await fetch(pingUrl, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${sdkToken}`,
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify({})
    });

    const startText = await startRes.text();
    let startData;

    try {
      startData = JSON.parse(startText);
    } catch {
      startData = { raw: startText };
    }

    setApiStatus(startRes.ok ? "DaVinci call complete" : "DaVinci call returned error");
    showJson("apiResult", {
      stage: "start-flow",
      ok: startRes.ok,
      status: startRes.status,
      body: startData
    });

  } catch (err) {
    console.error(err);
    setApiStatus("Exception during API invocation");
    showJson("apiResult", {
      stage: "exception",
      error: String(err),
      stack: err?.stack || null
    });
  }
};

/* ------------------------------------------------------------------
   DISPLAY CURRENT USER
------------------------------------------------------------------ */
const userA = await userManagerA.getUser().catch(() => null);
const userB = await userManagerB.getUser().catch(() => null);
const user = userB || userA;

if (user) {
  const activeFlow = userB ? "B" : "A";
  const oid = user.profile["oid.user"] || user.profile.sub || "N/A";
  const amanda = user.profile["amanda.user"] || "N/A";

  setStatus(`Authenticated (Flow ${activeFlow})`);

  document.getElementById("identity").style.display = "block";
  document.getElementById("identity").innerText =
    "Active Flow = " + activeFlow + "\n" +
    "OID = " + oid + "\n" +
    "FolderRSN = " + amanda;

  document.getElementById("claims").style.display = "block";
  document.getElementById("claims").innerText =
    JSON.stringify(user.profile, null, 2);
} else {
  setStatus("Not logged in");
}
</script>

</body>
</html>
